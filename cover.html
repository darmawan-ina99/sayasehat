<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover - The Mind Healer</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --gold-light: #eacda3;
            --dark: #0a0a0f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }

        .cover {
            width: 500px;
            height: 700px;
            background: linear-gradient(160deg, #0a0a1a 0%, #0d0d2b 30%, #0a0a1a 60%, #0d0d1a 100%);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(197,160,89,0.1);
            border: 2px solid rgba(197,160,89,0.15);
        }

        /* Efek partikel / bintang */
        .cover::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(197,160,89,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(197,160,89,0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(197,160,89,0.05) 0%, transparent 30%),
                radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 60% 40%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.6), transparent);
        }

        .cover > * { position: relative; z-index: 1; }

        /* Ornamen garis atas */
        .ornament-top {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin-bottom: 30px;
        }

        /* Label kecil di atas */
        .label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold-light);
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* Judul Utama */
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 2.6rem;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.15;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        .title .gold {
            background: linear-gradient(135deg, #c5a059, #eacda3, #c5a059);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Subjudul */
        .subtitle {
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            color: #b0b0b0;
            margin-bottom: 35px;
            line-height: 1.6;
            max-width: 380px;
        }

        /* Pemisah */
        .divider {
            width: 50px;
            height: 1px;
            background: var(--gold);
            margin: 0 auto 30px;
            opacity: 0.7;
        }

        /* Nama Penulis */
        .author {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--gold-light);
            font-style: italic;
            font-weight: 600;
        }

        /* Tagline bawah */
        .tagline {
            font-family: 'Poppins', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(197,160,89,0.6);
            margin-top: 30px;
        }

        /* Ornamen garis bawah */
        .ornament-bottom {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(197,160,89,0.5), transparent);
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="cover">
        <div class="ornament-top"></div>

        <p class="label">✨ Ebook Spiritual & Ilmiah</p>

        <h1 class="title">
            The <span class="gold">Mind</span><br>Healer
        </h1>

        <p class="subtitle">
            Jangan Menyerah Pada Sakitmu,<br>
            Aktifkan Kembali Kekuatan Penyembuh<br>
            di Dalam Dirimu
        </p>

        <div class="divider"></div>

        <p class="author">Darmawan Winata</p>

        <div class="ornament-bottom"></div>

        <p class="tagline">Edisi Pertama • 2026</p>
    </div>

</body>
</html>
